name: Browser Regression Gate

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main", "dev"]

jobs:
  extension-regression:
    name: Extension E2E (${{ matrix.browser }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            browser: chromium
            channel: chromium
          - os: windows-latest
            browser: edge
            channel: msedge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Install Playwright runtime
        run: npx playwright install --with-deps ${{ matrix.channel }}

      - name: Run extension regression
        env:
          NEXUSMIND_E2E_CHANNEL: ${{ matrix.channel }}
        run: npm run test:e2e:extension
