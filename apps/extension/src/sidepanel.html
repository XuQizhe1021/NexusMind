<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusMind</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>NexusMind</h1>
      </header>

      <section class="panel">
        <h2>当前页 AI 问答</h2>
        <textarea id="questionInput" placeholder="请输入你想问的问题"></textarea>
        <button id="askBtn">提问</button>
        <pre id="answerOutput"></pre>
      </section>

      <section class="panel">
        <h2>知识织网（Phase 2）</h2>
        <div class="row">
          <button id="indexGraphBtn">收录当前页</button>
          <button id="refreshGraphBtn" class="secondary-btn">刷新图谱统计</button>
        </div>
        <p id="graphStatus"></p>
        <p id="graphStats"></p>
        <label>图谱搜索
          <input id="graphSearchInput" placeholder="输入实体关键词，例如 OpenAI" />
        </label>
        <button id="graphSearchBtn">搜索并回溯</button>
        <div id="graphCanvas" class="graph-canvas"></div>
        <pre id="graphResultOutput"></pre>
      </section>

      <section class="panel">
        <h2>页面重写（Phase 3）</h2>
        <label>当前重写意图
          <select id="rewriteIntentInput">
            <option value="learning">学习模式</option>
            <option value="summary">摘要模式</option>
            <option value="distraction_free">去干扰模式</option>
          </select>
        </label>
        <div class="row">
          <button id="rewriteApplyBtn">应用页面重写</button>
          <button id="rewriteRollbackBtn" class="secondary-btn">一键还原</button>
        </div>
        <p id="rewriteStatus"></p>
      </section>

      <section class="panel">
        <h2>基础设置</h2>
        <label>Provider
          <select id="providerInput">
            <option value="openai">OpenAI</option>
            <option value="claude">Claude</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>
        <label>Model
          <input id="modelInput" value="gpt-4o-mini" />
        </label>
        <label>API Key
          <input id="apiKeyInput" type="password" />
        </label>
        <label>隐私模式
          <select id="privacyModeInput">
            <option value="strict">strict</option>
            <option value="balanced">balanced</option>
          </select>
        </label>
        <label>每日额度
          <input id="dailyLimitInput" type="number" value="200" />
        </label>
        <label>每月额度
          <input id="monthlyLimitInput" type="number" value="5000" />
        </label>
        <label>全局默认重写意图
          <select id="defaultIntentInput">
            <option value="learning">学习模式</option>
            <option value="summary">摘要模式</option>
            <option value="distraction_free">去干扰模式</option>
          </select>
        </label>
        <div class="row">
          <button id="saveSiteIntentBtn" class="secondary-btn">设为当前站点默认意图</button>
          <button id="clearSiteIntentBtn" class="secondary-btn">清除当前站点默认意图</button>
        </div>
        <p id="siteIntentStatus"></p>
        <button id="saveBtn">保存设置</button>
        <p id="saveStatus"></p>
      </section>
    </main>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
